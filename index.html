<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TP Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#070b14;
  color:white;
  display:flex;
  min-height:100vh;
  overflow:hidden;
}

.sidebar{
  width:280px;
  background:#0d111c;
  border-right:1px solid #1e2535;
  overflow-y:auto;
}

.logo{
  padding:24px;
  font-size:32px;
  font-weight:700;
  border-bottom:1px solid #1e2535;
}

.sidebar-title{
  padding:20px;
  color:#94a3b8;
  font-size:12px;
  letter-spacing:2px;
}

.po-list{
  padding:0 12px 20px;
}

.po-item{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
  transition:0.3s;
  cursor:pointer;
}

.po-item:hover{
  border-color:#3b82f6;
}

.po-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.po-number{
  font-size:18px;
  font-weight:700;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.green{
  background:#22c55e;
}

.orange{
  background:#f59e0b;
}

.blue{
  background:#3b82f6;
}

.po-lines{
  margin-top:8px;
  color:#94a3b8;
}

.main{
  flex:1;
  overflow-y:auto;
  padding:25px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
  gap:15px;
}

.header h1{
  font-size:36px;
}

.export-wrap{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.export-btn{
  background:#111827;
  color:white;
  border:1px solid #1f2937;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.export-btn:hover{
  background:#1e293b;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  margin-bottom:30px;
}

.stat-card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:18px;
  padding:22px;
}

.stat-title{
  color:#94a3b8;
  font-size:13px;
  margin-bottom:10px;
}

.stat-value{
  font-size:40px;
  font-weight:700;
}

.green-text{
  color:#22c55e;
}

.orange-text{
  color:#f59e0b;
}

.blue-text{
  color:#3b82f6;
}

.table-card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:18px;
  overflow:auto;
  margin-bottom:30px;
}

.table-header{
  padding:18px;
  border-bottom:1px solid #1f2937;
  font-size:22px;
  font-weight:700;
}

table{
  width:100%;
  min-width:1400px;
  border-collapse:collapse;
}

th{
  background:#0f172a;
  color:#94a3b8;
  text-align:left;
  padding:14px;
  font-size:12px;
  letter-spacing:1px;
  position:sticky;
  top:0;
}

td{
  padding:16px;
  border-top:1px solid #1f2937;
}

.status{
  padding:6px 12px;
  border-radius:8px;
  font-size:12px;
  font-weight:700;
  display:inline-block;
}

.clean{
  background:#052e16;
  color:#22c55e;
}

.approved{
  background:#14532d;
  color:#4ade80;
}

.review{
  background:#451a03;
  color:#f59e0b;
}

.flagged{
  background:#78350f;
  color:#facc15;
}

.refresh{
  background:#1e293b;
  color:#cbd5e1;
}

.reason{
  color:#94a3b8;
  font-weight:600;
}

.action-buttons{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.action-btn{
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
  transition:0.3s;
}

.action-btn:hover{
  opacity:0.9;
}

.approve-btn{
  background:#2563eb;
  color:white;
}

.flag-btn{
  background:#facc15;
  color:black;
}

.refresh-btn{
  background:#1e293b;
  color:white;
}

.po-input{
  width:100px;
  background:#0f172a;
  border:1px solid #334155;
  color:white;
  padding:8px;
  border-radius:8px;
}

@media(max-width:1200px){

  .stats{
    grid-template-columns:repeat(2,1fr);
  }

}

@media(max-width:900px){

  body{
    flex-direction:column;
    overflow:auto;
  }

  .sidebar{
    width:100%;
    height:auto;
    border-right:none;
    border-bottom:1px solid #1e2535;
  }

  .main{
    width:100%;
    padding:15px;
  }

  .header{
    flex-direction:column;
    align-items:flex-start;
  }

  .header h1{
    font-size:28px;
  }

  .stats{
    grid-template-columns:1fr;
  }

  .table-card{
    overflow:auto;
  }

  table{
    min-width:1400px;
  }

  .export-wrap{
    width:100%;
  }

  .export-btn{
    width:100%;
  }

}

</style>

</head>

<body>

<div class="sidebar">

  <div class="logo">
    TP Dashboard
  </div>

  <div class="sidebar-title">
    PURCHASE ORDERS
  </div>

  <div class="po-list" id="poList"></div>

</div>

<div class="main">

  <div class="header">

    <h1>Instamart TP Dashboard</h1>

    <div class="export-wrap">

      <button
        class="export-btn"
        onclick="exportPO(currentPO)">

        EXPORT SELECTED PO

      </button>

      <button
        class="export-btn"
        onclick="exportAllPOs()">

        EXPORT ALL POs

      </button>

    </div>

  </div>

  <div class="stats">

    <div class="stat-card">
      <div class="stat-title">TOTAL POs</div>
      <div class="stat-value" id="totalPOs">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">PO LINES</div>
      <div class="stat-value" id="totalLines">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">CLEAN</div>
      <div class="stat-value green-text" id="cleanCount">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">AUTO-APPROVED</div>
      <div class="stat-value blue-text" id="approvedCount">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">NEEDS REVIEW</div>
      <div class="stat-value orange-text" id="reviewCount">0</div>
    </div>

  </div>

  <div id="content"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxYzvrWQ0g1AIuEgiLdlVXX3YD5i1bIDwVbmBRUbZaqABqdS08DuisAFUTkncq1MCEKyw/exec";

let FULL_DATA = [];
let currentPO = "";

fetch(API_URL)

.then(res => res.json())

.then(data => {

  FULL_DATA = data;

  buildSidebar(data);

  updateStats(data);

})

.catch(err => {

  console.log(err);

  alert("Apps Script Error");

});

function getStatus(po,uc){

  const diff =
  Math.abs(Number(po)-Number(uc));

  if(diff === 0){
    return "CLEAN";
  }

  if(diff <= 2){
    return "AUTO-APPROVED";
  }

  return "REVIEW";

}

function buildSidebar(data){

  const grouped = {};

  data.forEach(r => {

    if(!grouped[r.PoNumber]){
      grouped[r.PoNumber] = [];
    }

    grouped[r.PoNumber].push(r);

  });

  let html = "";

  Object.keys(grouped).forEach(po => {

    const rows = grouped[po];

    let dotClass = "green";

    rows.forEach(r => {

      const status =
      getStatus(
        r.PO_PRICE,
        r.UC_PRICE
      );

      if(status === "REVIEW"){
        dotClass = "orange";
      }

      else if(
        status === "AUTO-APPROVED"
        &&
        dotClass !== "orange"
      ){
        dotClass = "blue";
      }

    });

    html += `

      <div
        class="po-item"
        onclick="showPO('${po}')">

        <div class="po-top">

          <div class="po-number">
            ${po}
          </div>

          <div class="dot ${dotClass}"></div>

        </div>

        <div class="po-lines">
          ${rows.length} lines
        </div>

      </div>

    `;

  });

  document.getElementById("poList")
  .innerHTML = html;

}

function updateStats(data){

  const pos = new Set();

  let clean = 0;
  let approved = 0;
  let review = 0;

  data.forEach(r => {

    pos.add(r.PoNumber);

    const status =
    getStatus(
      r.PO_PRICE,
      r.UC_PRICE
    );

    if(status === "CLEAN"){
      clean++;
    }

    else if(status === "AUTO-APPROVED"){
      approved++;
    }

    else{
      review++;
    }

  });

  document.getElementById("totalPOs")
  .innerText = pos.size;

  document.getElementById("totalLines")
  .innerText = data.length;

  document.getElementById("cleanCount")
  .innerText = clean;

  document.getElementById("approvedCount")
  .innerText = approved;

  document.getElementById("reviewCount")
  .innerText = review;

}

</script>

</body>

</html>
