<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TP Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#070b14;
  color:white;
  display:flex;
  height:100vh;
  overflow:hidden;
}

.sidebar{
  width:280px;
  background:#0d111c;
  border-right:1px solid #1e2535;
  overflow-y:auto;
}

.logo{
  padding:24px;
  font-size:24px;
  font-weight:700;
  border-bottom:1px solid #1e2535;
}

.sidebar-title{
  padding:20px;
  color:#94a3b8;
  font-size:11px;
  letter-spacing:2px;
}

.po-list{
  padding:0 12px 20px;
}

.po-item{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
  transition:0.3s;
  cursor:pointer;
}

.po-item:hover{
  border-color:#3b82f6;
}

.po-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.po-number{
  font-size:14px;
  font-weight:700;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.green{
  background:#22c55e;
}

.orange{
  background:#f59e0b;
}

.blue{
  background:#3b82f6;
}

.po-lines{
  margin-top:8px;
  color:#94a3b8;
  font-size:12px;
}

.main{
  flex:1;
  overflow-y:auto;
  padding:25px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.header h1{
  font-size:24px;
}

.export-wrap{
  display:flex;
  gap:10px;
}

.export-btn{
  background:#111827;
  color:white;
  border:1px solid #1f2937;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-size:12px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:18px;
  margin-bottom:30px;
}

.stat-card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:18px;
  padding:22px;
}

.stat-title{
  color:#94a3b8;
  font-size:11px;
  margin-bottom:10px;
}

.stat-value{
  font-size:28px;
  font-weight:700;
}

.green-text{
  color:#22c55e;
}

.orange-text{
  color:#f59e0b;
}

.blue-text{
  color:#3b82f6;
}

.table-card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:18px;
  overflow:hidden;
  margin-bottom:30px;
}

.table-header{
  padding:18px;
  border-bottom:1px solid #1f2937;
  font-size:18px;
  font-weight:700;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#0f172a;
  color:#94a3b8;
  text-align:left;
  padding:14px;
  font-size:11px;
  letter-spacing:1px;
}

td{
  padding:16px;
  border-top:1px solid #1f2937;
  font-size:12px;
  line-height:1.4;
}

.status{
  padding:6px 12px;
  border-radius:8px;
  font-size:11px;
  font-weight:700;
  display:inline-block;
}

.clean{
  background:#052e16;
  color:#22c55e;
}

.approved{
  background:#14532d;
  color:#4ade80;
}

.review{
  background:#451a03;
  color:#f59e0b;
}

.flagged{
  background:#78350f;
  color:#facc15;
}

.refresh{
  background:#1e293b;
  color:#cbd5e1;
}

.reason{
  color:#94a3b8;
  font-weight:600;
  font-size:11px;
}

.action-buttons{
  display:flex;
  gap:8px;
}

.action-btn{
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:11px;
  font-weight:600;
}

.approve-btn{
  background:#2563eb;
  color:white;
}

.flag-btn{
  background:#facc15;
  color:black;
}

.refresh-btn{
  background:#1e293b;
  color:white;
}

.po-input{
  width:100px;
  background:#0f172a;
  border:1px solid #334155;
  color:white;
  padding:8px;
  border-radius:8px;
  font-size:12px;
}

</style>

</head>

<body>

<div class="sidebar">

  <div class="logo">
    TP Dashboard
  </div>

  <div class="sidebar-title">
    PURCHASE ORDERS
  </div>

  <div class="po-list" id="poList"></div>

</div>

<div class="main">

  <div class="header">

    <h1>Instamart TP Dashboard</h1>

    <div class="export-wrap">

      <button
        class="export-btn"
        onclick="exportPO(currentPO)">

        EXPORT SELECTED PO

      </button>

      <button
        class="export-btn"
        onclick="exportAllPOs()">

        EXPORT ALL POs

      </button>

    </div>

  </div>

  <div class="stats">

    <div class="stat-card">
      <div class="stat-title">TOTAL POs</div>
      <div class="stat-value" id="totalPOs">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">PO LINES</div>
      <div class="stat-value" id="totalLines">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">CLEAN</div>
      <div class="stat-value green-text" id="cleanCount">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">AUTO-APPROVED</div>
      <div class="stat-value blue-text" id="approvedCount">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">NEEDS REVIEW</div>
      <div class="stat-value orange-text" id="reviewCount">0</div>
    </div>

  </div>

  <div id="content"></div>

</div>

</body>

</html>
