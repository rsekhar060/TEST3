<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>PO Dashboard</title>

<style>

body{
  font-family:Arial;
  background:#f4f4f4;
  padding:20px;
  margin:0;
}

h1{
  text-align:center;
  margin-bottom:25px;
}

.cards{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.card{
  flex:1;
  padding:20px;
  border-radius:10px;
  color:white;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.green{
  background:#28a745;
}

.red{
  background:#dc3545;
}

.blue{
  background:#007bff;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th{
  background:#111;
  color:white;
  padding:12px;
}

td{
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

.match{
  background:#d4edda;
}

.flag{
  background:#f8d7da;
}

</style>

</head>

<body>

<h1>PO_PRICE vs UC_PRICE Dashboard</h1>

<div class="cards">

  <div class="card green">
    MATCH
    <div id="matchCount">0</div>
  </div>

  <div class="card red">
    FLAG
    <div id="flagCount">0</div>
  </div>

  <div class="card blue">
    TOTAL
    <div id="totalCount">0</div>
  </div>

</div>

<table>

<thead>

<tr>
<th>PoNumber</th>
<th>FacilityName</th>
<th>SkuCode</th>
<th>OrderedQty</th>
<th>PO_PRICE</th>
<th>UC_PRICE</th>
<th>STATUS</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycby7BBCcchcb_03RLstZpD-eK6eojuYnrPVUY92qCGlsIMjOI5lSO-Q6VDNlX_twQiYoOw/exec";

fetch(API_URL)

.then(res => res.json())

.then(data => {

  let match = 0;
  let flag = 0;

  let html = "";

  data.forEach(row => {

    const rowClass =
      row.STATUS === "MATCH"
      ? "match"
      : "flag";

    if(row.STATUS === "MATCH"){
      match++;
    }else{
      flag++;
    }

    html += `
      <tr class="${rowClass}">
        <td>${row.PoNumber || ""}</td>
        <td>${row.FacilityName || ""}</td>
        <td>${row.SkuCode || ""}</td>
        <td>${row.OrderedQty || ""}</td>
        <td>${row.PO_PRICE || ""}</td>
        <td>${row.UC_PRICE || ""}</td>
        <td>${row.STATUS || ""}</td>
      </tr>
    `;

  });

  document.getElementById("tableBody")
    .innerHTML = html;

  document.getElementById("matchCount")
    .innerHTML = match;

  document.getElementById("flagCount")
    .innerHTML = flag;

  document.getElementById("totalCount")
    .innerHTML = data.length;

})

.catch(error => {

  console.log(error);

  alert("Apps Script Error");

});

</script>

</body>
</html>
