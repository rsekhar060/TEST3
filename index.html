<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TP Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#070b14;
  color:white;
  display:flex;
  height:100vh;
  overflow:hidden;
}

.sidebar{
  width:280px;
  background:#0d111c;
  border-right:1px solid #1e2535;
  overflow-y:auto;
}

.logo{
  padding:24px;
  font-size:32px;
  font-weight:700;
  border-bottom:1px solid #1e2535;
}

.sidebar-title{
  padding:20px;
  color:#94a3b8;
  font-size:12px;
  letter-spacing:2px;
}

.po-list{
  padding:0 12px 20px;
}

.po-item{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
  transition:0.3s;
}

.po-item:hover{
  border-color:#3b82f6;
}

.po-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.po-number{
  font-size:18px;
  font-weight:700;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.green{
  background:#22c55e;
}

.orange{
  background:#f59e0b;
}

.blue{
  background:#3b82f6;
}

.po-lines{
  margin-top:8px;
  color:#94a3b8;
}

.main{
  flex:1;
  overflow-y:auto;
  padding:25px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.header h1{
  font-size:36px;
}

.export-btn{
  background:#111827;
  color:white;
  border:1px solid #1f2937;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.export-btn:hover{
  background:#1f2937;
}

.stats{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:18px;
  margin-bottom:30px;
}

.stat-card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:18px;
  padding:22px;
}

.stat-title{
  color:#94a3b8;
  font-size:13px;
  margin-bottom:10px;
}

.stat-value{
  font-size:40px;
  font-weight:700;
}

.green-text{
  color:#22c55e;
}

.orange-text{
  color:#f59e0b;
}

.blue-text{
  color:#3b82f6;
}

.section-title{
  font-size:24px;
  margin-bottom:20px;
}

.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
  gap:20px;
}

.tp-card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:18px;
  padding:22px;
}

.tp-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.tp-title{
  font-size:22px;
  font-weight:700;
}

.badge{
  padding:6px 12px;
  border-radius:10px;
  font-size:12px;
  font-weight:700;
}

.badge-clean{
  background:#052e16;
  color:#22c55e;
}

.badge-review{
  background:#451a03;
  color:#f59e0b;
}

.badge-approved{
  background:#172554;
  color:#3b82f6;
}

.product-name{
  color:#cbd5e1;
  margin-bottom:20px;
}

.metrics{
  display:flex;
  gap:30px;
  margin-bottom:20px;
}

.metric small{
  display:block;
  color:#94a3b8;
  margin-bottom:6px;
}

.metric-value{
  font-size:28px;
  font-weight:700;
}

.action-row{
  display:flex;
  gap:12px;
}

.btn{
  border:none;
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  opacity:0.9;
}

.btn-approve{
  background:#3b82f6;
  color:white;
}

.btn-flag{
  background:#facc15;
  color:black;
}

.btn-refresh{
  background:#1e293b;
  color:white;
}

@media(max-width:1200px){

  .stats{
    grid-template-columns:repeat(2,1fr);
  }

}

@media(max-width:768px){

  body{
    flex-direction:column;
    height:auto;
  }

  .sidebar{
    width:100%;
    height:300px;
  }

  .stats{
    grid-template-columns:1fr;
  }

}

</style>

</head>

<body>

<div class="sidebar">

  <div class="logo">
    TP Dashboard
  </div>

  <div class="sidebar-title">
    PURCHASE ORDERS
  </div>

  <div class="po-list" id="poList"></div>

</div>

<div class="main">

  <div class="header">

    <h1>Instamart TP Dashboard</h1>

    <button class="export-btn" onclick="exportData()">
      EXPORT CSV
    </button>

  </div>

  <div class="stats">

    <div class="stat-card">
      <div class="stat-title">TOTAL POs</div>
      <div class="stat-value" id="totalPOs">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">PO LINES</div>
      <div class="stat-value" id="totalLines">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">CLEAN</div>
      <div class="stat-value green-text" id="cleanCount">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">AUTO APPROVED</div>
      <div class="stat-value blue-text" id="approvedCount">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">NEEDS REVIEW</div>
      <div class="stat-value orange-text" id="reviewCount">0</div>
    </div>

  </div>

  <div class="section-title">
    PO Review Cards
  </div>

  <div class="card-grid" id="cardGrid"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxYzvrWQ0g1AIuEgiLdlVXX3YD5i1bIDwVbmBRUbZaqABqdS08DuisAFUTkncq1MCEKyw/exec";

fetch(API_URL)

.then(res => res.json())

.then(data => {

  let clean = 0;
  let review = 0;
  let approved = 0;

  const totalPOs = new Set();

  let sidebarHTML = "";
  let cardHTML = "";

  data.forEach(item => {

    totalPOs.add(item.PoNumber);

    const poPrice =
      Number(item.PO_PRICE || 0);

    const ucPrice =
      Number(item.UC_PRICE || 0);

    const diff =
      Math.abs(poPrice - ucPrice).toFixed(2);

    let status = "CLEAN";
    let badgeClass = "badge-clean";
    let dotClass = "green";

    if(diff > 0 && diff <= 2){

      status = "APPROVED";
      badgeClass = "badge-approved";
      dotClass = "blue";

      approved++;

    }

    else if(diff > 2){

      status = "REVIEW";
      badgeClass = "badge-review";
      dotClass = "orange";

      review++;

    }

    else{

      clean++;

    }

    sidebarHTML += `

      <div class="po-item">

        <div class="po-top">

          <div class="po-number">
            ${item.PoNumber}
          </div>

          <div class="dot ${dotClass}"></div>

        </div>

        <div class="po-lines">
          ${item.OrderedQty} lines
        </div>

      </div>

    `;

    cardHTML += `

      <div class="tp-card">

        <div class="tp-header">

          <div class="tp-title">
            ${item.SKU_ID}
          </div>

          <div class="badge ${badgeClass}">
            ${status}
          </div>

        </div>

        <div class="product-name">
          Facility: ${item.FacilityName}
        </div>

        <div class="metrics">

          <div class="metric">

            <small>PO PRICE</small>

            <div class="metric-value">
              ₹${poPrice}
            </div>

          </div>

          <div class="metric">

            <small>UC PRICE</small>

            <div class="metric-value">
              ₹${ucPrice}
            </div>

          </div>

          <div class="metric">

            <small>DIFF</small>

            <div class="metric-value">
              ₹${diff}
            </div>

          </div>

        </div>

        <div class="action-row">

          <button
            class="btn btn-approve"
            onclick="approvePO(this,'${item.PoNumber}')">

            Approve

          </button>

          <button
            class="btn btn-flag"
            onclick="flagPO('${item.PoNumber}')">

            Flag Platform

          </button>

          <button
            class="btn btn-refresh"
            onclick="refreshPO()">

            TP Refresh

          </button>

        </div>

      </div>

    `;

  });

  document.getElementById("poList")
    .innerHTML = sidebarHTML;

  document.getElementById("cardGrid")
    .innerHTML = cardHTML;

  document.getElementById("totalPOs")
    .innerText = totalPOs.size;

  document.getElementById("totalLines")
    .innerText = data.length;

  document.getElementById("cleanCount")
    .innerText = clean;

  document.getElementById("approvedCount")
    .innerText = approved;

  document.getElementById("reviewCount")
    .innerText = review;

})

.catch(err => {

  console.log(err);

  alert("Apps Script Error");

});

function approvePO(btn,po){

  btn.innerText = "Approved";

  btn.style.background =
  "#16a34a";

  console.log(
    "Approved:", po
  );

}

function flagPO(po){

  alert(
    "Platform Flagged : " + po
  );

}

function refreshPO(){

  location.reload();

}

function exportData(){

  fetch(API_URL)

  .then(res => res.json())

  .then(data => {

    let csv =
    "PoNumber,FacilityName,SKU_ID,PO_PRICE,UC_PRICE,STATUS\n";

    data.forEach(r => {

      const poPrice =
      Number(r.PO_PRICE || 0);

      const ucPrice =
      Number(r.UC_PRICE || 0);

      const diff =
      Math.abs(poPrice - ucPrice);

      let status = "CLEAN";

      if(diff > 0 && diff <= 2){

        status = "APPROVED";

      }

      else if(diff > 2){

        status = "REVIEW";

      }

      csv +=
      `${r.PoNumber},${r.FacilityName},${r.SKU_ID},${r.PO_PRICE},${r.UC_PRICE},${status}\n`;

    });

    const blob =
    new Blob([csv], {
      type:'text/csv'
    });

    const a =
    document.createElement('a');

    a.href =
    URL.createObjectURL(blob);

    a.download =
    "TP_Dashboard.csv";

    a.click();

  });

}

</script>

</body>

</html>
